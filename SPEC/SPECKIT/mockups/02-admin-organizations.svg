<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SargentNexus organizations admin mockup</title>
  <desc id="desc">A Fluent UI inspired Site Admin organizations screen with command bar, search, filter, list, and create organization panel.</desc>
  <rect width="1600" height="1000" fill="#f3f2f1"/>
  <rect width="1600" height="72" fill="#ffffff"/>
  <text x="28" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">SargentNexus</text>
