<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SargentNexus user management mockup</title>
  <desc id="desc">An organization admin user management screen using Fluent UI patterns such as command bar, filter chips, details list, and side panel editing.</desc>
  <rect width="1600" height="1000" fill="#f3f2f1"/>
  <rect width="1600" height="72" fill="#ffffff"/>
  <rect x="0" y="72" width="248" height="928" fill="#ffffff"/>
  <text x="28" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">SargentNexus</text>
  <text x="32" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#64748b">NORTHWIND MANUFACTURING</text>
  <text x="36" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Overview</text>
  <rect x="16" y="196" width="216" height="44" rx="10" fill="#e0f2fe"/>
  <text x="36" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Users</text>
  <text x="36" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Boards</text>
  <text x="36" y="316" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Statuses</text>
  <text x="280" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Users</text>
  <text x="280" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Org Admin can manage only users in their organization. Inactive accounts remain listed but cannot authenticate.</text>
  <rect x="280" y="188" width="1292" height="64" rx="16" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="304" y="204" width="260" height="34" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="322" y="226" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Search by name or email</text>
  <rect x="584" y="204" width="120" height="34" rx="17" fill="#e0f2fe"/>
  <text x="644" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">All roles</text>
  <rect x="720" y="204" width="120" height="34" rx="17" fill="#ffffff" stroke="#94a3b8"/>
  <text x="780" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Active</text>
  <rect x="1360" y="200" width="188" height="40" rx="8" fill="#0f6cbd"/>
  <text x="1454" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Add user</text>
  <rect x="280" y="272" width="900" height="648" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="314" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">NAME</text>
  <text x="578" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">EMAIL</text>
  <text x="884" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">ROLE</text>
  <text x="1018" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">STATUS</text>
  <line x1="304" y1="336" x2="1144" y2="336" stroke="#e2e8f0"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="314" y="388" font-size="15" font-weight="700" fill="#0f172a">Jamie Flores</text>
    <text x="578" y="388" font-size="14" fill="#0f172a">jamie.flores@northwind.com</text>
    <rect x="876" y="364" width="108" height="28" rx="14" fill="#dbeafe"/>
    <text x="930" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Org Admin</text>
    <rect x="1006" y="364" width="84" height="28" rx="14" fill="#dcfce7"/>
    <text x="1048" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Active</text>
  </g>
  <line x1="304" y1="420" x2="1144" y2="420" stroke="#e2e8f0"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="314" y="472" font-size="15" font-weight="700" fill="#0f172a">Chris Singh</text>
    <text x="578" y="472" font-size="14" fill="#0f172a">chris.singh@northwind.com</text>
    <rect x="894" y="448" width="72" height="28" rx="14" fill="#f1f5f9"/>
    <text x="930" y="467" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">User</text>
    <rect x="996" y="448" width="104" height="28" rx="14" fill="#fee2e2"/>
    <text x="1048" y="467" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Inactive</text>
  </g>
  <rect x="1210" y="272" width="362" height="648" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="1242" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Edit user</text>
  <text x="1242" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Large labeled inputs and inline rules reduce admin mistakes. Role and status are separated from identity fields.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">
    <text x="1242" y="398">First Name</text>
    <text x="1242" y="470">Last Name</text>
    <text x="1242" y="542">Email</text>
    <text x="1242" y="614">Role</text>
    <text x="1242" y="686">Status</text>
  </g>
  <g fill="#ffffff" stroke="#94a3b8">
    <rect x="1242" y="410" width="298" height="44" rx="8"/>
    <rect x="1242" y="482" width="298" height="44" rx="8"/>
    <rect x="1242" y="554" width="298" height="44" rx="8"/>
    <rect x="1242" y="626" width="298" height="44" rx="8"/>
    <rect x="1242" y="698" width="298" height="44" rx="8"/>
  </g>
  <rect x="1242" y="772" width="298" height="82" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1260" y="802" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Guardrail from spec</text>
  <text x="1260" y="826" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#9a3412">The last Org Admin cannot remove their own admin access or deactivate themselves.</text>
  <rect x="1242" y="872" width="130" height="40" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1307" y="897" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Cancel</text>
  <rect x="1410" y="872" width="130" height="40" rx="8" fill="#0f6cbd"/>
  <text x="1475" y="897" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Save</text>
</svg>
