<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">SargentNexus login mockup</title>
  <desc id="desc">A Fluent UI styled sign-in screen.</desc>
  <rect width="1440" height="1024" fill="#f5f5f5"/>
  <rect x="0" y="0" width="1440" height="88" fill="#ffffff"/>
  <text x="96" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">SargentNexus</text>
  <text x="96" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Organization-scoped idea management</text>
  <rect x="150" y="170" width="1140" height="700" rx="28" fill="#e7eef8"/>
  <rect x="220" y="240" width="470" height="540" rx="24" fill="#ffffff" stroke="#d0d7de"/>
  <text x="268" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Sign in</text>
  <text x="268" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Use your organization account to access boards, ideas, comments, and admin tools.</text>
  <text x="268" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#334155">Email</text>
  <rect x="268" y="425" width="374" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="286" y="458" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">alex.parker@northwind.com</text>
  <text x="268" y="520" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#334155">Password</text>
  <rect x="268" y="535" width="374" height="52" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="286" y="568" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="3" fill="#111827">.............</text>
  <rect x="268" y="620" width="168" height="48" rx="8" fill="#0f6cbd"/>
  <text x="335" y="651" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Continue</text>
  <rect x="454" y="620" width="188" height="48" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="548" y="651" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Need help?</text>
  <rect x="268" y="695" width="374" height="58" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="286" y="725" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">Sign-in behavior from spec</text>
  <text x="286" y="746" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">If the email exists in multiple organizations, the next step asks the user to pick the tenant before final authentication.</text>
  <rect x="760" y="240" width="470" height="540" rx="24" fill="#ffffff" stroke="#d0d7de"/>
  <text x="808" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Choose organization</text>
  <text x="808" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">We found this email in more than one organization. Pick the workspace you want to enter.</text>
  <rect x="808" y="390" width="374" height="86" rx="16" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="834" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Northwind Manufacturing</text>
  <text x="834" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Org Admin access • 2 boards • 37 ideas</text>
  <rect x="1096" y="410" width="86" height="36" rx="18" fill="#0f6cbd"/>
  <text x="1139" y="433" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Select</text>
  <rect x="808" y="494" width="374" height="86" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="834" y="528" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Northwind Services</text>
  <text x="834" y="554" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">User access • 1 board • 12 ideas</text>
  <rect x="1096" y="514" width="86" height="36" rx="18" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1139" y="537" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Select</text>
  <rect x="808" y="625" width="374" height="106" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="834" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">Usability notes</text>
  <text x="834" y="681" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">• Clear step-by-step flow reduces confusion.</text>
  <text x="834" y="704" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">• Primary action is isolated and consistent.</text>
  <text x="834" y="727" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">• Large hit targets support keyboard and touch use.</text>
</svg>
