paths:
  /api/v1/auth/login:
    post:
      summary: Authenticate a user with globally unique email credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/auth.yaml#/LoginRequest
      responses:
        '200':
          description: Authenticated response
        '401':
          description: Invalid credentials
        '403':
          description: Inactive account
        '429':
          description: Account locked out
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user summary
  /api/v1/auth/change-password:
    post:
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../components/schemas/auth.yaml#/ChangePasswordRequest
      responses:
        '204':
          description: Password changed
