OrganizationCreateRequest:
  type: object
  required: [companyName, address, city, state, zip, phone, primaryContactFirstName, primaryContactLastName]
  properties:
    companyName: { type: string, maxLength: 200 }
    address: { type: string, maxLength: 200 }
    city: { type: string, maxLength: 100 }
    state: { type: string, maxLength: 50 }
    zip: { type: string, maxLength: 20 }
    phone: { type: string, maxLength: 25 }
    primaryContactFirstName: { type: string, maxLength: 100 }
    primaryContactLastName: { type: string, maxLength: 100 }
UserCreateRequest:
  type: object
  required: [firstName, lastName, email, role, initialPassword]
  properties:
    firstName: { type: string, maxLength: 100 }
    lastName: { type: string, maxLength: 100 }
    email:
      type: string
      format: email
    role: { type: string }
    initialPassword: { type: string }
    status: { type: string }
UserUpdateRequest:
  type: object
  required: [firstName, lastName, email, role, status]
  properties:
    firstName: { type: string, maxLength: 100 }
    lastName: { type: string, maxLength: 100 }
    email:
      type: string
      format: email
    role: { type: string }
    status: { type: string }
