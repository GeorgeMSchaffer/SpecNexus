LoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
    password:
      type: string
LoginSuccessResponse:
  type: object
  required: [accessToken, expiresInSeconds, requiresPasswordChange, user]
  properties:
    accessToken:
      type: string
    expiresInSeconds:
      type: integer
    requiresPasswordChange:
      type: boolean
    user:
      $ref: ./common.yaml#/UserSummary
ChangePasswordRequest:
  type: object
  required: [currentPassword, newPassword]
  properties:
    currentPassword:
      type: string
    newPassword:
      type: string
