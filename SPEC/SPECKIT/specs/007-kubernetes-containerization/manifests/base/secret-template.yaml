apiVersion: v1
kind: Secret
metadata:
  name: sargentnexus-runtime-secrets
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: Server=tcp:sargentnexus-sql,1433;Database=SargentNexus;User ID=sa;Password=REPLACE_ME;Encrypt=True;TrustServerCertificate=True;
  SqlServer__SaPassword: REPLACE_WITH_STRONG_SA_PASSWORD
  Seed__SiteAdminPassword: REPLACE_WITH_BOOTSTRAP_PASSWORD
  Auth__SigningKey: REPLACE_WITH_LONG_RANDOM_SIGNING_KEY
  Ingress__TlsCertificateSecretName: sargentnexus-tls