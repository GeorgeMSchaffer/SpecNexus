apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sargentnexus-sql
spec:
  serviceName: sargentnexus-sql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sargentnexus-sql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sargentnexus-sql
        app.kubernetes.io/part-of: sargentnexus
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1433
              name: tds
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Developer
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sargentnexus-runtime-secrets
                  key: SqlServer__SaPassword
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: tds
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: tds
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: sql-data
              mountPath: /var/opt/mssql
  volumeClaimTemplates:
    - metadata:
        name: sql-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi