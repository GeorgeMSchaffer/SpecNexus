openapi: 3.0.3
info:
  title: SargentNexus Authentication API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      summary: Authenticate a user with globally unique email credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '401':
          description: Invalid credentials
        '403':
          description: Inactive account
        '429':
          description: Account locked out
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
  /api/v1/auth/change-password:
    post:
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginSuccessResponse:
      type: object
      required: [accessToken, expiresInSeconds, requiresPasswordChange, user]
      properties:
        accessToken:
          type: string
        expiresInSeconds:
          type: integer
        requiresPasswordChange:
          type: boolean
        user:
          $ref: '#/components/schemas/UserSummary'
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    UserSummary:
      type: object
      required: [userId, role, firstName, lastName, email, status]
      properties:
        userId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
          nullable: true
        role:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
