openapi: 3.0.3
info:
  title: SargentNexus Authentication API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      summary: Authenticate a user with globally unique email credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginSuccessResponse'
                  - $ref: '#/components/schemas/OrganizationSelectionResponse'
        '400':
          description: Malformed request body or invalid request shape
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Inactive account
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          description: Account locked out
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          description: Missing, expired, or invalid authentication
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/auth/change-password:
    post:
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          description: Malformed request body or invalid password policy
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
        '401':
          description: Invalid current password or missing authentication
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Authenticated caller is not allowed to change this password
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/users/{userId}/temporary-password:
    post:
      summary: Issue a one-time display temporary password for a user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Temporary password issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporaryPasswordResponse'
        '401':
          description: Missing, expired, or invalid authentication
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Authenticated caller is not allowed to issue a temporary password for this user
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        organizationId:
          type: string
          format: uuid
          nullable: true
    LoginSuccessResponse:
      type: object
      required: [accessToken, expiresInSeconds, requiresPasswordChange, user]
      properties:
        accessToken:
          type: string
        expiresInSeconds:
          type: integer
        requiresPasswordChange:
          type: boolean
        user:
          $ref: '#/components/schemas/UserSummary'
    OrganizationSelectionResponse:
      type: object
      required: [requiresOrganizationSelection, organizations]
      properties:
        requiresOrganizationSelection:
          type: boolean
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/LoginOrganizationOption'
    LoginOrganizationOption:
      type: object
      required: [organizationId, organizationName]
      properties:
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    TemporaryPasswordResponse:
      type: object
      required: [temporaryPassword, mustChangePassword]
      properties:
        temporaryPassword:
          type: string
        mustChangePassword:
          type: boolean
    UserSummary:
      type: object
      required: [userId, role, firstName, lastName, email, status]
      properties:
        userId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
          nullable: true
        role:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
