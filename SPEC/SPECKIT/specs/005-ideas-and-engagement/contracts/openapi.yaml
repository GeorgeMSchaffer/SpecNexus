openapi: 3.0.3
info:
  title: SargentNexus Ideas and Engagement API
  version: 1.0.0
paths:
  /api/v1/boards/{boardId}/ideas:
    get:
      summary: List ideas on a board
      responses:
        '200':
          description: Paginated ideas
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to list ideas for this board
        '404':
          description: Board not found
    post:
      summary: Create an idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdeaWriteRequest'
      responses:
        '201':
          description: Idea created
        '400':
          description: Bad Request
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to create ideas for this board
        '404':
          description: Board not found
  /api/v1/ideas/{ideaId}:
    get:
      summary: Get full idea detail
      responses:
        '200':
          description: Idea detail
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to view this idea
        '404':
          description: Idea not found
    put:
      summary: Update idea content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdeaWriteRequest'
      responses:
        '200':
          description: Idea updated
        '400':
          description: Bad Request
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to update this idea
        '404':
          description: Idea not found

  /api/v1/ideas/{ideaId}/status:
    post:
      summary: Move an idea to a new status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [statusId]
              properties:
                statusId:
                  type: string
                  format: uuid
      responses:
        '204':
          description: Status updated
        '400':
          description: Bad Request
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to move this idea
        '404':
          description: Idea not found
  /api/v1/ideas/{ideaId}/comments:
    get:
      summary: List comments for an idea
      responses:
        '200':
          description: Paginated comments
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to view comments for this idea
        '404':
          description: Idea not found
    post:
      summary: Create a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentWriteRequest'
      responses:
        '201':
          description: Comment created
        '400':
          description: Bad Request
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to create comments for this idea
        '404':
          description: Idea not found
  /api/v1/comments/{commentId}:
    put:
      summary: Edit a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentWriteRequest'
      responses:
        '200':
          description: Comment updated
        '400':
          description: Bad Request
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to edit this comment
        '404':
          description: Comment not found
    delete:
      summary: Delete a comment
      responses:
        '204':
          description: Comment deleted
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to delete this comment
        '404':
          description: Comment not found
  /api/v1/ideas/{ideaId}/upvote/toggle:
    post:
      summary: Toggle the caller's upvote
      responses:
        '200':
          description: New upvote state
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to upvote this idea
        '404':
          description: Idea not found
components:
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type: { type: string, format: uri, nullable: true }
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        instance: { type: string, nullable: true }
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    IdeaWriteRequest:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          maxLength: 150
        description:
          type: string
          maxLength: 4000
        statusId:
          type: string
          format: uuid
        tagNames:
          type: array
          items:
            type: string
            maxLength: 100
        mentionEmails:
          type: array
          items:
            type: string
            format: email
    CommentWriteRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
