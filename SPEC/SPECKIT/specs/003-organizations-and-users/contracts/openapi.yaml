openapi: 3.0.3
info:
  title: SargentNexus Organizations and Users API
  version: 1.0.0
paths:
  /api/v1/organizations:
    get:
      summary: List organizations
      responses:
        '200':
          description: Paginated organizations
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to list organizations
    post:
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        '201':
          description: Organization created
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to create organizations
  /api/v1/organizations/{organizationId}:
    get:
      summary: Get organization detail
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Organization detail
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to view this organization
        '404':
          description: Organization not found
    put:
      summary: Update organization detail
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        '200':
          description: Organization updated
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to update this organization
        '404':
          description: Organization not found
  /api/v1/organizations/{organizationId}/archive:
    post:
      summary: Archive an organization
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '204':
          description: Organization archived
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to archive this organization
        '404':
          description: Organization not found
  /api/v1/organizations/{organizationId}/users:
    get:
      summary: List users in an organization
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Paginated users
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to list users for this organization
        '404':
          description: Organization not found
    post:
      summary: Create a user in an organization
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to create users for this organization
        '404':
          description: Organization not found
  /api/v1/users/{userId}:
    get:
      summary: Get user detail
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User detail
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to view this user
        '404':
          description: User not found
    put:
      summary: Update user detail
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to update this user
        '404':
          description: User not found
  /api/v1/users/{userId}/temporary-password:
    post:
      summary: Issue a one-time display temporary password for a user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Temporary password issued
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to issue a temporary password for this user
        '404':
          description: User not found
components:
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type: { type: string, format: uri, nullable: true }
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        instance: { type: string, nullable: true }
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    OrganizationCreateRequest:
      type: object
      required: [companyName, address, city, state, zip, phone, primaryContactFirstName, primaryContactLastName]
      properties:
        companyName: { type: string, maxLength: 200 }
        address: { type: string, maxLength: 200 }
        city: { type: string, maxLength: 100 }
        state: { type: string, maxLength: 50 }
        zip: { type: string, maxLength: 20 }
        phone: { type: string, maxLength: 25 }
        primaryContactFirstName: { type: string, maxLength: 100 }
        primaryContactLastName: { type: string, maxLength: 100 }
    UserCreateRequest:
      type: object
      required: [firstName, lastName, email, role, initialPassword]
      properties:
        firstName: { type: string, maxLength: 100 }
        lastName: { type: string, maxLength: 100 }
        email:
          type: string
          format: email
        role: { type: string }
        initialPassword: { type: string }
        status: { type: string }
    UserUpdateRequest:
      type: object
      required: [firstName, lastName, email, role, status]
      properties:
        firstName: { type: string, maxLength: 100 }
        lastName: { type: string, maxLength: 100 }
        email:
          type: string
          format: email
        role: { type: string }
        status: { type: string }
    TemporaryPasswordResponse:
      type: object
      required: [temporaryPassword, mustChangePassword]
      properties:
        temporaryPassword: { type: string }
        mustChangePassword: { type: boolean }
