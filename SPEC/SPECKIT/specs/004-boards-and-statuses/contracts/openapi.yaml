openapi: 3.0.3
info:
  title: SargentNexus Boards and Statuses API
  version: 1.0.0
paths:
  /api/v1/organizations/{organizationId}/statuses:
    get:
      summary: List statuses for an organization
      responses:
        '200':
          description: Status list
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to list statuses for this organization
        '404':
          description: Organization not found
    post:
      summary: Create a status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Status created
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to create statuses for this organization
        '404':
          description: Organization not found
  /api/v1/statuses/{statusId}:
    put:
      summary: Update a status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Status updated
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to update this status
        '404':
          description: Status not found
    delete:
      summary: Soft-delete a status
      responses:
        '204':
          description: Status deleted
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to delete this status
        '404':
          description: Status not found
  /api/v1/organizations/{organizationId}/boards:
    get:
      summary: List boards for an organization
      responses:
        '200':
          description: Board list
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to list boards for this organization
        '404':
          description: Organization not found
    post:
      summary: Create a board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardWriteRequest'
      responses:
        '201':
          description: Board created
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to create boards for this organization
        '404':
          description: Organization not found
  /api/v1/boards/{boardId}:
    get:
      summary: Get board detail
      responses:
        '200':
          description: Board detail
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to view this board
        '404':
          description: Board not found
    put:
      summary: Update a board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardWriteRequest'
      responses:
        '200':
          description: Board updated
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to update this board
        '404':
          description: Board not found
  /api/v1/boards/{boardId}/swimlanes/reorder:
    post:
      summary: Persist swimlane reorder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
      responses:
        '204':
          description: Reorder persisted
        '400':
          description: Malformed request body or invalid field constraints
        '401':
          description: Missing, expired, or invalid authentication
        '403':
          description: Authenticated caller is not allowed to reorder swimlanes for this board
        '404':
          description: Board not found
components:
  schemas:
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type: { type: string, format: uri, nullable: true }
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        instance: { type: string, nullable: true }
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
    BoardWriteRequest:
      type: object
      required: [name, swimlanes]
      properties:
        name:
          type: string
        swimlanes:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Swimlane'
    ReorderRequest:
      type: object
      required: [swimlanes]
      properties:
        swimlanes:
          type: array
          items:
            $ref: '#/components/schemas/Swimlane'
    Swimlane:
      type: object
      required: [statusId, order]
      properties:
        statusId:
          type: string
          format: uuid
        order:
          type: integer
